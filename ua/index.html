<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <noscript>
      <meta http-equiv="refresh" content="0; url=/" />
    </noscript>
  </head>
  <body>
    <script>
      try {
        localStorage.setItem('preferredLanguage', 'uk');
      } catch(e) {}

      requestAnimationFrame(() => {
        location.replace(window.location.origin + '/');
      });
    </script>
  </body>
</html>
